<!DOCTYPE html>
<html>

<link href="styles/style.css" type="text/css" rel="stylesheet">

<head>
  <meta charset="UTF-8">

  <style>
    table, th, td {
      border: 1px solid black;
      border-collapse: collapse;
    }
    th, td { padding: 5px; }
  </style>

  <script>
    function loadDoc() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function () {
        if (this.readyState == 4 && this.status == 200) {
          showCatalogInfo(this);
        }
      };
      xhttp.open("GET", "catalog.XML", true);
      xhttp.send();
    }

    function showCatalogInfo(xml) {
      var i;
      var xmlDoc = xml.responseXML;
      var table = "<tr><th>Bird</th><th>Photographer</th><th>State</th></tr>";
      var x = xmlDoc.getElementsByTagName("CD");

      for (i = 0; i < x.length; i++) {
        table += "<tr><td>" +
          x[i].getElementsByTagName("BIRD")[0].childNodes[0].nodeValue +
          "</td><td>" +


             x[i].getElementsByTagName("PHOTOGRAPHER")[0].childNodes[0].nodeValue +
          "</td><td>" +

            
          x[i].getElementsByTagName("STATE")[0].childNodes[0].nodeValue +
          "</td></tr>";
      }

      document.getElementById("catalogInformation").innerHTML = table;
    }
  </script>
</head>

<body>
  <table id="catalogInformation"></table>
  <button id="btnSubmit" onclick="loadDoc();">Show Information</button>

   <a class="nav-link" href="photos.html">See Photos!</a>
  
</body>

</html>
