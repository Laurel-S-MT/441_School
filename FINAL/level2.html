<!doctype html>
<html lang="en">
<head>

    <meta charset="UTF-8" />
    <title>LS_FINAL</title>

  

   <script src="https://cdn.jsdelivr.net/npm/phaser@3.11.0/dist/phaser.js"></script> 

   
  <a href="level3.html" id="level3Link" style="display:none;"> Next Level!</a>
 <script src="./scripts/main.js"></script>
    <link type="text/css" rel="stylesheet" href="./styles/main.css">
   
   <style type="text/css">
        body {
            margin: 0;
        }
    </style>
</head>
<body>

<script type="text/javascript">


var config = {
    type: Phaser.AUTO,
    width: 800,
    height: 600,
    physics: {
        default: 'arcade',
        arcade: {
            gravity: { y: 300 },
            debug: false
        }
    },
    scene: {
        preload: preload,
        create: create,
        update: update
    }
};

var player;
var stars;
var hearts;
var flowers;
var bombs;
var platforms;
var cursors;
var score = 0;
var gameOver = false;
var scoreText;

var level3Link;

var game = new Phaser.Game(config);

function preload ()
{
    //NEW COLLECTABLE
    this.load.image('heart', 'assets/heart.png');

    this.load.image('sky', 'assets/daytime.png');
    this.load.image('ground', 'assets/platform.png');
    this.load.image('star', 'assets/flower.png');
    this.load.image('bomb', 'assets/bomb.png');
    this.load.spritesheet('dude', 'assets/butterfly.png',
    
        { frameWidth: 32, frameHeight: 48 });
}

function create ()
{
    //  A simple background for our game
    this.add.image(400, 300, 'sky');

    //  The platforms group contains the ground and the 2 ledges we can jump on
    platforms = this.physics.add.staticGroup();

    //  Here we create the ground.
    //  Scale it to fit the width of the game (the original sprite is 400x32 in size)
    platforms.create(400, 568, 'ground').setScale(2).refreshBody();

    //  Now let's create some ledges
    //first platform
    platforms.create(500, 400, 'ground');
    //second platform
    platforms.create(50, 250, 'ground');
    //thrid platform
    platforms.create(750, 220, 'ground');
//NEW PLATFORM
   platforms.create(300, 90, 20, 10, 'ground');

    platforms.create(700, 90, 20, 10, 'ground');


    // The player and its settings
    player = this.physics.add.sprite(100, 450, 'dude');

    //  Player physics properties. Give the little guy a slight bounce.
    player.setBounce(0.2);
    player.setCollideWorldBounds(true);

    //  Our player animations, turning, walking left and walking right.
   // this.anims.create({
    //    key: 'left',
     //   frames: this.anims.generateFrameNumbers('dude', { start: 0, end: 3 }),
     //   frameRate: 10,
    //    repeat: -1
   // });

    this.anims.create({
        key: 'turn',
        frames: [ { key: 'dude', frame: 4 } ],
        frameRate: 20
    });

    //this.anims.create({
      //  key: 'right',
      //  frames: this.anims.generateFrameNumbers('dude', { start: 5, end: 8 }),
     //   frameRate: 10,
     //   repeat: -1
  //  });

    //  Input Events
    cursors = this.input.keyboard.createCursorKeys();

    //spacebar
    spaceKey = this.input.keyboard.addKey(Phaser.Input.Keyboard.KeyCodes.SPACE);

    //  Some stars to collect, 12 in total, evenly spaced 70 pixels apart along the x axis
    stars = this.physics.add.group({
        key: 'star',
        repeat: 11,
        setXY: { x: 12, y: 0, stepX: 70 }

        
    });


  hearts = this.physics.add.group({
        key: 'heart',
        repeat: 5,
        setXY: { x: 12, y: 0, stepX: 70 }

        
    });

    stars.children.iterate(function (child) {

        //  Give each star a slightly different bounce
        child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));
   
       child.setGravityY(1000);

    });

    hearts.children.iterate(function (child) {

       
        child.setBounceY(Phaser.Math.FloatBetween(0.4, 0.8));
        child.setScale(0.2);
   
    });

    bombs = this.physics.add.group();

    //  The score
    scoreText = this.add.text(16, 16, 'score: 0', { fontSize: '32px', fill: '#000' });

    level3Link = document.getElementById("level3Link");
    level3Link.style.display = "none";

    //  Collide the player and the stars with the platforms
    this.physics.add.collider(player, platforms);
    this.physics.add.collider(stars, platforms);
    this.physics.add.collider(hearts, platforms);
    this.physics.add.collider(bombs, platforms);

    //  Checks to see if the player overlaps with any of the stars if he does call the collectStar function
    this.physics.add.overlap(player, stars, collectStar, null, this);

     this.physics.add.overlap(player, hearts, collectHeart, null, this);

    this.physics.add.collider(player, bombs, hitBomb, null, this);
}

function update ()
{
    if (gameOver)
    {
        return;
    }

    if (cursors.left.isDown)
    {
        player.setVelocityX(-160);

        player.anims.play('left', true);
    }
    else if (cursors.right.isDown)
    {
        player.setVelocityX(160);

        player.anims.play('right', true);
    }
    else
    {
        player.setVelocityX(0);

        player.anims.play('turn');
    }

    if (spaceKey.isDown && player.body.touching.down)
    {
        player.setVelocityY(-330);
    }
}

function collectStar (player, star)
{
    star.disableBody(true, true);

    //  Add and update the score
   score += 10;
scoreText.setText('Score: ' + score);

// Show Level 2 link after enough stars
if (score >= 350)
{
    level3Link.style.display = "block";
}

    if (stars.countActive(true) === 0)
    {
        //  A new batch of stars to collect
        stars.children.iterate(function (child) {

            child.enableBody(true, child.x, 0, true, true);

        });

       for (let i = 0; i < 3; i++)
{
    var x = (player.x < 400)
        ? Phaser.Math.Between(400, 800)
        : Phaser.Math.Between(0, 400);

    var bomb = bombs.create(x, 16, 'bomb');

    bomb.setBounce(1);
    bomb.setCollideWorldBounds(true);

    bomb.setVelocity(
        Phaser.Math.Between(-200, 200),
        20
    );

    bomb.allowGravity = false;
}

    }
}

function collectHeart (player, heart)
{
    heart.disableBody(true, true);

    //  Add and update the score
    score += 20;
    scoreText.setText('Score: ' + score);

    if (stars.countActive(true) === 0)
    {
        //  A new batch of stars to collect
        stars.children.iterate(function (child) {

            child.enableBody(true, child.x, 0, true, true);

        });

      

    }
}

function hitBomb (player, bomb)
{
    this.physics.pause();

    player.setTint(0xff0000);

    gameOver = true;

    // Restart game after 1 second
    this.time.delayedCall(1000, () => {

        score = 0;
        gameOver = false;

        this.scene.restart();

    });
}


</script>

</body>
</html>
